<!DOCTYPE html>
<html>
<head>
    <title>OSC Test Overlay</title>
    <style>
        body { background: transparent; color: #cdd6f4; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 20px; }
        .container { background: rgba(30, 30, 46, 0.95); border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); max-width: 800px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #89b4fa; }
        .log { height: 400px; overflow-y: auto; background: #11111b; border-radius: 8px; padding: 15px; font-family: "SF Mono", "Monaco", "Inconsolata", monospace; font-size: 13px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .log-item { margin-bottom: 4px; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .log-client { color: #f5c2e7; font-weight: bold; }
        .log-addr { color: #a6e3a1; }
        .log-args { color: #fab387; }
        .stat-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat { background: rgba(166, 227, 161, 0.1); color: #a6e3a1; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; border: 1px solid rgba(166, 227, 161, 0.2); }
        .input-group { display: flex; gap: 8px; margin-top: 20px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; }
        input { background: #1e1e2e; border: 1px solid #45475a; color: white; padding: 10px; border-radius: 6px; flex: 1; outline: none; }
        input:focus { border-color: #89b4fa; }
        button { background: #89b4fa; color: #11111b; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: transform 0.1s, background 0.2s; }
        button:hover { background: #b4befe; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="stat-bar">
            <h2>OSC Router Monitor</h2>
            <div class="stat" id="rate">Rate: 0 msgs/sec</div>
        </div>
        
        <div class="log" id="log">Waiting for OSC messages...</div>
        
        <div class="input-group">
            <input id="addr" placeholder="Address (e.g. /obs/test)" value="/obs/test">
            <input id="fmt" placeholder="Format (i, f, s)" value="f" style="max-width: 80px;">
            <input id="args" placeholder="Args JSON (e.g. [0.5])" value="[0.5]">
            <button onclick="sendOsc()">Send OSC</button>
        </div>
    </div>

    <script>
        let msgCount = 0;
        let totalMsgs = 0;
        const logEl = document.getElementById('log');

        // Handle Inbound OSC from Plugin
        window.addEventListener('osc_message', (e) => {
            console.log("OSC Event Received:", e.detail);
            msgCount++;
            totalMsgs++;
            const data = e.detail;
            
            const item = document.createElement('div');
            item.className = 'log-item';
            
            const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // Safety check for data fields
            const client = data.client || "Unknown";
            const addr = data.address || "/unknown";
            const args = data.args || [];

            item.innerHTML = `<span style="color: #6c7086">[${timestamp}]</span> ` +
                           `<span class="log-client">[${client}]</span> ` +
                           `<span class="log-addr">${addr}</span> ` +
                           `<span class="log-args">${JSON.stringify(args)}</span>`;
            
            logEl.prepend(item);
            
            // Performance management: Limit log size
            if (logEl.childNodes.length > 100) {
                logEl.removeChild(logEl.lastChild);
            }
        });

        // Deep scan for OBS API
        function findObsApi() {
            // 1. Standard locations
            if (window.obsstudio) return window.obsstudio;
            if (window.obsStudio) return window.obsStudio;
            if (typeof obsstudio !== 'undefined') return obsstudio;
            
            // 2. Scan window for likely candidates
            for (let key in window) {
                if (key.toLowerCase().includes('obs') && typeof window[key] === 'object' && window[key] !== null) {
                    if (window[key].call || window[key].on) return window[key];
                }
            }
            return null;
        }

        function updateApiStatus() {
            const api = findObsApi();
            const statusEl = document.getElementById('api-status') || document.createElement('div');
            statusEl.id = 'api-status';
            statusEl.style.fontSize = "12px";
            statusEl.style.marginTop = "10px";
            
            if (api) {
                const methods = Object.keys(api).filter(k => typeof api[k] === 'function');
                statusEl.style.color = "#a6e3a1";
                statusEl.innerHTML = `✓ OBS API Found<br>` +
                                 `<small style="color: #9399b2">Methods: ${methods.join(', ') || 'none'}</small>`;
            } else {
                statusEl.style.color = "#f38ba8";
                statusEl.innerHTML = `✗ OBS API NOT detected. <button onclick="updateApiStatus()" style="padding: 2px 6px; font-size: 10px;">Retry Scan</button>`;
            }
            
            const bar = document.querySelector('.stat-bar');
            if (bar && !document.getElementById('api-status')) bar.appendChild(statusEl);
        }

        window.addEventListener('obsstudioReady', () => {
            console.log("obsstudioReady event fired!");
            updateApiStatus();
        });

        window.addEventListener('load', () => {
            setTimeout(updateApiStatus, 1000);
        });

        // Handle Outbound OSC via HTTP Bridge
        async function sendOsc() {
            const addr = document.getElementById('addr').value;
            const fmt = document.getElementById('fmt').value;
            const argsRaw = document.getElementById('args').value;
            
            let args = [];
            try {
                args = JSON.parse(argsRaw);
            } catch (e) {
                console.error("Invalid JSON in args field");
                return;
            }

            try {
                console.log("Sending OSC via HTTP Bridge:", { addr, fmt, args });
                const response = await fetch('http://127.0.0.1:12347/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        address: addr,
                        format: fmt,
                        args: args.map(v => ({ value: v }))
                    })
                });

                if (response.ok) {
                    const successLine = document.createElement('div');
                    successLine.style.color = '#a6e3a1';
                    successLine.style.fontSize = '12px';
                    successLine.textContent = `Sent: ${addr} ${argsRaw}`;
                    logEl.prepend(successLine);
                } else {
                    throw new Error("Bridge response not OK");
                }
            } catch (err) {
                console.error("HTTP Bridge error:", err);
                const errorLine = document.createElement('div');
                errorLine.style.color = '#f38ba8';
                errorLine.textContent = "Error: OSC HTTP Bridge not found. Is the plugin running?";
                logEl.prepend(errorLine);
            }
        }

        // Stats tracking (Messages Per Second)
        setInterval(() => {
            document.getElementById('rate').textContent = `Rate: ${msgCount} msgs/sec (Total: ${totalMsgs})`;
            msgCount = 0;
        }, 1000);
    </script>
</body>
</html>
