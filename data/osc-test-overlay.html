<!DOCTYPE html>
<html>

<head>
    <title>OSC Test Overlay</title>
    <style>
        body {
            background: transparent;
            color: #cdd6f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px;
        }

        .container {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-top: 0;
            color: #89b4fa;
        }

        .log {
            height: 400px;
            overflow-y: auto;
            background: #11111b;
            border-radius: 8px;
            padding: 15px;
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
            font-size: 13px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-item {
            margin-bottom: 4px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .log-client {
            color: #f5c2e7;
            font-weight: bold;
        }

        .log-addr {
            color: #a6e3a1;
        }

        .log-args {
            color: #fab387;
        }

        .stat-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat {
            background: rgba(166, 227, 161, 0.1);
            color: #a6e3a1;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid rgba(166, 227, 161, 0.2);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
        }

        .row {
            display: flex;
            gap: 8px;
        }

        input {
            background: #1e1e2e;
            border: 1px solid #45475a;
            color: white;
            padding: 10px;
            border-radius: 6px;
            flex: 1;
            outline: none;
        }

        input:focus {
            border-color: #89b4fa;
        }

        button {
            background: #89b4fa;
            color: #11111b;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: #b4befe;
        }

        button:active {
            transform: scale(0.95);
        }

        .status {
            font-size: 12px;
            color: #9399b2;
            margin-bottom: 10px;
        }

        .client-list {
            margin-top: 10px;
            font-size: 12px;
            color: #94e2d5;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="stat-bar">
            <h2>OSC Monitor</h2>
            <div id="ws-status" class="stat">WS: Disconnected</div>
        </div>

        <div id="server-info" class="status">Waiting for server details...</div>
        <div id="client-info" class="client-list"></div>

        <div class="log" id="log">Waiting for OSC messages...</div>

        <div class="input-group">
            <div class="row">
                <input id="addr" placeholder="Address (e.g. /obs/test)" value="/obs/test">
                <input id="fmt" placeholder="Format (i, f, s)" value="f" style="max-width: 80px;">
                <input id="target" placeholder="Target (Name or Port)" value="">
            </div>
            <div class="row">
                <input id="args" placeholder="Args JSON (e.g. [0.5])" value="[0.5]">
                <button onclick="sendOsc()">Send via WS</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let wsPort = null;
        const logEl = document.getElementById('log');

        function appendLog(msg, color = null) {
            const item = document.createElement('div');
            item.className = 'log-item';
            if (color) item.style.color = color;
            item.textContent = msg;
            logEl.prepend(item);
            if (logEl.childNodes.length > 100) logEl.removeChild(logEl.lastChild);
        }

        async function discoverAndConnect() {
            try {
                const response = await fetch('/__lws/ws_port');
                if (!response.ok) throw new Error('Failed to fetch port');
                wsPort = await response.text();
                connect(wsPort);
            } catch (err) {
                console.error("Discovery error:", err);
                appendLog("Discovery failed, retrying in 5s...", "#f38ba8");
                setTimeout(discoverAndConnect, 5000);
            }
        }

        function connect(port) {
            if (ws) ws.close();

            const url = `ws://127.0.0.1:${port}/ws`;
            ws = new WebSocket(url);

            ws.onopen = () => {
                document.getElementById('ws-status').textContent = `WS: Connected (${port})`;
                document.getElementById('ws-status').style.color = '#a6e3a1';
                document.getElementById('server-info').textContent = `Bridge: ws://127.0.0.1:${port}/ws`;
                appendLog(`Connected to Media Warp Bridge on port ${port}`, '#a6e3a1');
            };

            ws.onmessage = (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.a === 'osc_message') {
                        console.log(e);
                        const timestamp = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                        const argsDisplay = (data.args || []).map(a => a.value !== undefined ? a.value : JSON.stringify(a)).join(', ');
                        const item = document.createElement('div');
                        item.className = 'log-item';
                        item.innerHTML = `<span style="color: #6c7086">[${timestamp}]</span> ` +
                            `<span class="log-client">[${data.client || '?'}]</span> ` +
                            `<span class="log-addr">${data.address || '/'}</span> ` +
                            `<span class="log-args">[${argsDisplay}]</span>`;

                        logEl.prepend(item);
                        if (logEl.childNodes.length > 100) logEl.removeChild(logEl.lastChild);
                    }
                } catch (err) {
                    console.error("Parse error:", err);
                }
            };

            ws.onclose = () => {
                document.getElementById('ws-status').textContent = "WS: Disconnected";
                document.getElementById('ws-status').style.color = '#f38ba8';
                appendLog("WebSocket disconnected, retrying in 5s...", '#f38ba8');
                setTimeout(discoverAndConnect, 5000);
            };

            ws.onerror = (err) => {
                console.error("WS Error:", err);
            };
        }

        // Start discovery
        discoverAndConnect();

        function sendOsc() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                appendLog("Error: WebSocket not connected", '#f38ba8');
                return;
            }

            const addr = document.getElementById('addr').value;
            const fmt = document.getElementById('fmt').value;
            const target = document.getElementById('target').value;
            const argsRaw = document.getElementById('args').value;

            let args = [];
            try {
                args = JSON.parse(argsRaw);
            } catch (e) {
                appendLog("Error: Invalid JSON in args", '#f38ba8');
                return;
            }

            const payload = {
                a: "osc_message",
                address: addr,
                format: fmt,
                args: args.map(v => ({ value: v }))
            };

            if (target) payload.target = target;

            ws.send(JSON.stringify(payload));
            appendLog(`Sent to ${target || 'All'}: ${addr} ${argsRaw}`, '#89b4fa');
        }
    </script>
</body>

</html>
